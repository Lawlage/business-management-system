services:
  backend:
    build:
      target: base
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage
      # Isolate Docker's config/route cache from the host filesystem so
      # bare-metal tests don't pick up Docker-specific settings (e.g. REDIS_HOST=redis)
      - /var/www/html/bootstrap/cache

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://nginx:80
    networks: [app]

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks: [app]

  nginx:
    ports:
      - "8090:80"
