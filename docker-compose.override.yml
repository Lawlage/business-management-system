version: "3.9"

services:
  backend:
    build:
      target: base
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://nginx:80
    networks: [app]

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks: [app]

  nginx:
    ports:
      - "127.0.0.1:8090:80"
      - "127.0.0.1:5173:5173"
